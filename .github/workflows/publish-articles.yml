name: Publish Articles

# Runs on a biweekly schedule OR when manually triggered from the Actions tab.
# Workflow: review content on the site → confirm it looks good → trigger this.

on:
  # Manual trigger — go to Actions → "Publish Articles" → "Run workflow"
  workflow_dispatch:
    inputs:
      platforms:
        description: "Platforms to publish to (comma-separated)"
        required: false
        default: "dev,hashnode"
      dry_run:
        description: "Dry run (no actual publishing)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

  # Automatic biweekly reminder — still requires a manual trigger to actually publish,
  # but you can change this to auto-publish by removing the workflow_dispatch check below.
  schedule:
    - cron: "0 9 1,15 * *"  # 9am UTC on the 1st and 15th of each month

jobs:
  publish:
    name: Publish to DEV + Hashnode
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: portfolio-next/package-lock.json

      - name: Install dependencies
        working-directory: portfolio-next
        run: npm ci

      - name: Publish articles
        working-directory: portfolio-next
        env:
          DEV_API_KEY: ${{ secrets.DEV_API_KEY }}
          HASHNODE_TOKEN: ${{ secrets.HASHNODE_TOKEN }}
          HASHNODE_PUB_ID: ${{ secrets.HASHNODE_PUB_ID }}
        run: |
          PLATFORMS="${{ github.event.inputs.platforms || 'dev,hashnode' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          if [ "$DRY_RUN" = "true" ]; then
            npm run publish -- --all --platforms "$PLATFORMS" --dry-run
          else
            npm run publish -- --all --platforms "$PLATFORMS"
          fi
