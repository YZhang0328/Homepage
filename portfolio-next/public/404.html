<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yujia Zhang</title>
    <meta name="robots" content="noindex" />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #ffffff;
      }
    </style>
    <script>
      (function () {
        function loadApp() {
          fetch("/index.html", { cache: "no-store" })
            .then(function (response) {
              return response.text();
            })
            .then(function (html) {
              document.open();
              document.write(html);
              document.close();
            })
            .catch(function () {
              window.location.replace("/");
            });
        }

        if (location.pathname === "/") {
          window.location.replace("/");
          return;
        }

        loadApp();
      })();
    </script>
  </head>
  <body></body>
</html>
